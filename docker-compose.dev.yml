name: osiris-dev
services:
  app:
    build:
      context: .
      dockerfile: dev.Dockerfile
    container_name: osiris_dev
    volumes:
      - .:/var/www/html
      - vendor-data-dev:/var/www/html/vendor
      - ./img:/var/www/html/img:rw

    ports:
      - "8081:80"
    depends_on:
      - mongo
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - OSIRIS_DB_HOST=mongo
    command: >
      sh -c "php -S 0.0.0.0:80 -t /var/www/html"

  mongo:
    image: mongo:6.0
    container_name: mongodb_dev
    ports:
      - "27018:27017"
    volumes:
      - mongo-data-dev:/data/db
      - ./dump:/dump
    command: mongod --bind_ip_all

volumes:
  mongo-data-dev:
  vendor-data-dev:
