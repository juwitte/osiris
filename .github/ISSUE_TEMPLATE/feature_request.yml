name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["feature"]
# type: Feature
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to suggest a new feature or improvement!

        Please describe the feature or improvement you would like to see.
        Explain why this is important and how it would benefit users or which problem it could solve.
        Also, if you have any specific ideas or examples, please include them.
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      placeholder: "Describe the feature or improvement here..."
    validations:
      required: true