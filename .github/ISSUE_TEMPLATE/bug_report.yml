name: Bug Report
description: File a bug report.
title: "[Bug]: "
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: version
    attributes:
      label: OSIRIS version(s):
      placeholder: "e.g. v2.0.2, v2.1.0"
      value: "v2.0.2"
    validations:
      required: true

  - type: input
    id: browsers
    attributes:
      label: Browser(s):
      placeholder: "e.g. Firefox, Chrome, Safari, Microsoft Edge"

  - type: textarea
    id: what-happened
    attributes:
      label: Bug description
      description: |
        Please describe in detail what happened and what you expected to happen.
        Also include steps on how to reproduce the bug. 
        Feel free to add screenshots and any other relevant information that may also help us.
      placeholder: Describe the bug here...
      value: Oh no, a bug!
    validations:
      required: true